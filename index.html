<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Hubble — GitHub Profile Analytics</title>
  <meta name="description" content="Explore any GitHub profile's repositories, followers, and programming language breakdown with beautiful live-updating charts.">
  <meta name="keywords" content="GitHub analytics, GitHub profile, repository explorer, language chart, developer tools">
  <meta name="author" content="Hubble">
  <meta property="og:title" content="Hubble — GitHub Profile Analytics">
  <meta property="og:description" content="Search any GitHub username and instantly see their repos, stats, and language breakdown.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231A1A18'/><circle cx='16' cy='16' r='7' fill='none' stroke='white' stroke-width='2.5'/><circle cx='16' cy='16' r='2.5' fill='white'/></svg>">
</head>
<body>

  <!-- Screen reader announcer for live updates -->
  <div id="sr-announcer" class="sr-only" aria-live="polite"></div>

  <!-- ─── Header ─────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="container header-inner">

      <!-- Logo -->
      <a href="/" class="logo" aria-label="Hubble home">
        <span class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="5" fill="none" stroke="white" stroke-width="2"/>
            <circle cx="8" cy="8" r="1.5" fill="white"/>
          </svg>
        </span>
        Hubble
      </a>

      <!-- Search -->
      <form class="search-form" id="search-form" role="search" aria-label="Search GitHub users">
        <div class="search-input-wrapper">
          <span class="search-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
              <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
            </svg>
          </span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search GitHub username…"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="GitHub username"
            maxlength="39"
          >
        </div>
        <button type="submit" id="search-btn" class="search-btn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
          </svg>
          Search
        </button>
      </form>

      <!-- Rate Limit -->
      <div id="rate-limit" class="rate-limit-badge" aria-label="GitHub API rate limit remaining" title="GitHub API requests remaining this hour">
        <span id="rate-dot" class="rate-dot"></span>
        <span id="rate-count">60/60</span>
        <span style="color:var(--text-3);font-family:var(--font-sans);font-size:0.6875rem;font-weight:400">req</span>
      </div>

    </div>
  </header>

  <!-- ─── Main ───────────────────────────────────── -->
  <main class="main" id="main" role="main">
    <div class="container">

      <!-- Dynamic content injected here -->
      <div id="main-content">

        <!-- Hero (shown before first search) -->
        <div class="hero" id="hero-section">
          <div class="animate-fade-up">
            <h1 class="hero-title">Explore any<br>GitHub profile.</h1>
          </div>
          <p class="hero-subtitle animate-fade-up" style="animation-delay:80ms">
            Search a username to see repos, language breakdowns,
            and profile analytics — live.
          </p>
          <div class="hero-hint animate-fade-up" style="animation-delay:160ms">
            <span>Try</span>
            <code>taiwrash</code>
            <span>or</span>
            <code>torvalds</code>
          </div>
          <div class="example-tags animate-fade-up" style="animation-delay:220ms" aria-label="Example GitHub usernames">
            <button class="example-tag" data-user="taiwrash" aria-label="Search taiwrash">taiwrash</button>
            <button class="example-tag" data-user="torvalds" aria-label="Search torvalds">torvalds</button>
            <button class="example-tag" data-user="gaearon"  aria-label="Search gaearon">gaearon</button>
            <button class="example-tag" data-user="sindresorhus" aria-label="Search sindresorhus">sindresorhus</button>
            <button class="example-tag" data-user="DHH"      aria-label="Search DHH">DHH</button>
            <button class="example-tag" data-user="yyx990803" aria-label="Search yyx990803">yyx990803</button>
          </div>

          <!-- Hero illustration: mini rings -->
          <div style="margin-top:var(--s-10);opacity:0.06" aria-hidden="true">
            <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <circle cx="100" cy="100" r="90" fill="none" stroke="#1A1A18" stroke-width="1"/>
              <circle cx="100" cy="100" r="70" fill="none" stroke="#1A1A18" stroke-width="1"/>
              <circle cx="100" cy="100" r="50" fill="none" stroke="#1A1A18" stroke-width="1"/>
              <circle cx="100" cy="100" r="30" fill="none" stroke="#1A1A18" stroke-width="1"/>
              <circle cx="100" cy="100" r="6" fill="#1A1A18"/>
            </svg>
          </div>
        </div>

      </div><!-- /main-content -->
    </div>
  </main>

  <!-- ─── Footer ─────────────────────────────────── -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>
        <strong>Hubble</strong> — built with the
        <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer">GitHub REST API</a>.
        Unauthenticated: 60 req/hr · Data shown is public.
        <a href="slides.html" style="margin-left:1em">📊 Slides</a>
      </p>
    </div>
  </footer>

  <!-- ─── Scripts ────────────────────────────────── -->
  <!-- ES modules preserve scope and enable import/export -->
  <script type="module" src="js/app.js?v=1.0.1"></script>

</body>
</html>
